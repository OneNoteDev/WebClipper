<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title></title>
<link rel="stylesheet" href="renderer.css">
</head>
<body>
<div id="signin-overlay" style="display:none;" role="dialog" aria-modal="true" aria-label="Sign in">
	<div id="signin-panel">
		<img src="images/onenote_logo_clipper.png" alt="OneNote" class="signin-logo">
		<h2 class="signin-title">OneNote Web Clipper</h2>
		<p class="signin-description" id="signin-description">Sign in to clip this page to OneNote</p>
		<button id="signin-msa-btn" class="signin-btn">Sign in with Microsoft account</button>
		<button id="signin-orgid-btn" class="signin-btn signin-btn-secondary">Sign in with work or school account</button>
		<div id="signin-error" class="signin-error" role="alert" style="display:none;"></div>
		<div id="signin-progress" class="signin-progress" style="display:none;">Signing in...</div>
	</div>
</div>
<div id="preview-area">
<div id="article-header" style="display:none;" role="toolbar" aria-label="Article options">
	<button id="highlight-btn" aria-pressed="false" title="Toggle highlighter">
		<img src="images/editoroptions/highlight_tool_off.svg" alt="">
	</button>
	<div class="header-separator"></div>
	<div id="font-family-group">
		<button id="sans-serif-btn" class="font-btn active" aria-pressed="true">Sans-serif</button>
		<button id="serif-btn" class="font-btn" aria-pressed="false">Serif</button>
	</div>
	<div class="header-separator"></div>
	<div id="font-size-group">
		<button id="font-decrease-btn" title="Decrease font size">
			<img src="images/editoroptions/font_down.svg" alt="">
		</button>
		<button id="font-increase-btn" title="Increase font size">
			<img src="images/editoroptions/font_up.svg" alt="">
		</button>
	</div>
</div>
<!--
	sandbox="allow-same-origin" blocks script execution inside the captured page
	and the article preview while still permitting CSS rendering, image/font
	loading, and same-origin DOM reads (needed by Readability + bookmark
	extraction). Defense in depth on top of contentCaptureInject's tag/attr
	scrubbing — anything that survives the capture filter still can't run here.
-->
<iframe id="content-frame" tabindex="-1" sandbox="allow-same-origin"></iframe>
<div id="preview-frame-wrap" tabindex="0" role="region" aria-label="Clip preview"><iframe id="preview-frame" tabindex="-1" sandbox="allow-same-origin"></iframe></div>
<div id="preview-container" tabindex="0" role="region" aria-label="Clip preview"></div>
</div>
<div id="sidebar" role="main" aria-label="OneNote Web Clipper">
	<div id="sidebar-header">
		<img src="images/onenote_logo_clipper.png" alt="">
		<span class="title" id="sidebar-title">OneNote Web Clipper</span>
	</div>
	<div id="sidebar-body">
		<div id="mode-group" class="sidebar-group">
			<label class="field-label" id="mode-label">What do you want to capture?</label>
			<div id="mode-panel" role="toolbar" aria-label="Clipping mode">

				</button>

				</button>
				<button class="mode-btn" data-mode="bookmark" aria-pressed="false">
					<svg class="mode-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true"><path d="M4 4.5C4 3.11929 5.11929 2 6.5 2H13.5C14.8807 2 16 3.11929 16 4.5V17.5C16 17.6881 15.8945 17.8602 15.7269 17.9456C15.5593 18.0309 15.358 18.015 15.2059 17.9044L10 14.1182L4.79409 17.9044C4.64199 18.015 4.4407 18.0309 4.27311 17.9456C4.10553 17.8602 4 17.6881 4 17.5V4.5ZM6.5 3C5.67157 3 5 3.67157 5 4.5V16.5181L9.70592 13.0956C9.88124 12.9681 10.1188 12.9681 10.2941 13.0956L15 16.5181V4.5C15 3.67157 14.3284 3 13.5 3H6.5Z" fill="currentColor"/></svg><span>Bookmark</span>

				</button>

			</div>
			<div id="pdf-options" style="display:none;" role="group" aria-label="PDF options">
				<div id="pdf-page-selection" role="radiogroup" aria-label="Page selection">
					<label class="pdf-radio-label">
						<input type="radio" name="pdf-pages" value="all" checked> <span>All pages</span>
					</label>
					<label class="pdf-radio-label">
						<input type="radio" name="pdf-pages" value="range"> <span>Page range</span>
						<input type="text" id="pdf-range-input" class="pdf-range-input" placeholder="e.g. 1-5, 7, 9-12" readonly aria-label="Page range" dir="ltr">
					</label>
					<div id="pdf-range-error" class="pdf-range-error" role="alert" style="display:none;"></div>
				</div>
				<div id="pdf-checkboxes">
					<label class="pdf-checkbox-label" id="pdf-attach-label">
						<input type="checkbox" id="pdf-attach-checkbox" checked> <span>Attach PDF file</span>
						<span class="pdf-checkbox-subtext">(all pages)</span>
					</label>
					<div id="pdf-attach-warning" class="pdf-attach-warning" style="display:none;" role="status">PDF too large to attach</div>
					<label class="pdf-checkbox-label">
						<input type="checkbox" id="pdf-distribute-checkbox"> <span>New note for each PDF page</span>
					</label>
				</div>
			</div>
		</div>
		<div id="meta-group" class="sidebar-group">
			<label class="field-label" id="title-label" for="title-field">Title</label>
			<textarea id="title-field" rows="2" placeholder="Add a page title..."></textarea>
			<label class="field-label" id="note-label" for="note-field">Note</label>
			<textarea id="note-field" rows="2" placeholder="Add a note..."></textarea>
			<label class="field-label" id="source-label">Source</label>
			<div id="source-url" class="source-url" aria-labelledby="source-label"><svg class="source-icon" width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M9.49999 4H10.5C12.433 4 14 5.567 14 7.5C14 9.36856 12.5357 10.8951 10.6941 10.9948L10.5023 11L9.5023 11.0046C9.22616 11.0059 9.00127 10.783 8.99999 10.5069C8.99888 10.2614 9.17481 10.0565 9.40787 10.0131L9.4977 10.0046L10.5 10C11.8807 10 13 8.88071 13 7.5C13 6.17452 11.9685 5.08996 10.6644 5.00532L10.5 5H9.49999C9.22386 5 8.99999 4.77614 8.99999 4.5C8.99999 4.25454 9.17687 4.05039 9.41012 4.00806L9.49999 4ZM5.5 4H6.5C6.77614 4 7 4.22386 7 4.5C7 4.74546 6.82312 4.94961 6.58988 4.99194L6.5 5H5.5C4.11929 5 3 6.11929 3 7.5C3 8.82548 4.03154 9.91004 5.33562 9.99468L5.5 10H6.5C6.77614 10 7 10.2239 7 10.5C7 10.7455 6.82312 10.9496 6.58988 10.9919L6.5 11H5.5C3.567 11 2 9.433 2 7.5C2 5.63144 3.46428 4.10487 5.30796 4.00518L5.5 4ZM5.50023 7L10.5002 7.0023C10.7764 7.00242 11.0001 7.22638 11 7.50252C10.9999 7.74798 10.8229 7.95205 10.5897 7.99428L10.4998 8.0023L5.49977 8C5.22363 7.99987 4.99987 7.77591 5 7.49977C5.00011 7.25431 5.17708 7.05024 5.41035 7.00801L5.50023 7Z" fill="currentColor"/></svg><span id="source-url-text" dir="ltr"></span></div>
		</div>
		<div id="section-group" class="sidebar-group">
			<label class="field-label" id="section-label">Location</label>
			<div id="section-picker">
				<div id="section-selected" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="section-label"></div>
				<div id="section-list-container" role="listbox">
					<ul id="section-list" role="presentation"></ul>
				</div>
			</div>
		</div>
		<div id="button-row">
			<button id="save-btn">Clip</button>
			<button id="cancel-btn">Cancel</button>
		</div>
		<div id="success-banner" style="display:none;" role="status">
			<div class="status-row">
				<span class="status-icon status-icon-success" aria-hidden="true"></span>
				<span id="success-text" class="status-title"></span>
			</div>
			<p id="success-description" class="status-description"></p>
			<button id="view-onenote-link"></button>
		</div>
		<div id="error-banner" style="display:none;" role="alert">
			<div class="status-row">
				<span class="status-icon status-icon-error" aria-hidden="true"></span>
				<span id="error-title" class="status-title"></span>
			</div>
			<p id="error-description" class="status-description"></p>
			<button id="copy-diagnostics" type="button" style="display:none;" aria-label="Copy diagnostic information">
				<span class="copy-icon" aria-hidden="true">&#x1F4CB;</span><span id="copy-diagnostics-label">Copy diagnostic info</span>
			</button>
		</div>
		<div id="capture-panel">
			<div id="status-text"></div>
			<div id="progress-info"></div>
			<div id="progress-bar-track"><div id="progress-bar-fill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div></div>
		</div>
	</div>
	<div id="user-info">
		<div id="user-info-left">
			<span id="user-email" dir="ltr"></span>
			<a id="signout-link" href="#">Sign out</a>
		</div>

	</div>
</div>
