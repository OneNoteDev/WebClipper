<!DOCTYPE html>
<html>
<head>
<title></title>
<style>
::-webkit-scrollbar { display: none; }
html { overflow-y: scroll !important; overflow-x: hidden !important; scrollbar-width: none; }
body { margin: 0; padding: 0; overflow: visible !important; }
/* Force content to reflow within viewport — no horizontal clipping */
img, video, canvas, svg, embed, object { max-width: 100% !important; height: auto !important; }
table { max-width: 100% !important; }
pre, code { overflow-wrap: break-word !important; white-space: pre-wrap !important; }
</style>
</head>

</body>
</html>
