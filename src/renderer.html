<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title></title>
<link rel="stylesheet" href="renderer.css">
</head>
<body>
<div id="signin-overlay" style="display:none;" role="dialog" aria-label="Sign in">
	<div id="signin-panel">
		<img src="images/onenote_logo_clipper.png" alt="OneNote" class="signin-logo">
		<h2 class="signin-title">OneNote Web Clipper</h2>
		<p class="signin-description" id="signin-description">Sign in to clip this page to OneNote</p>
		<button id="signin-msa-btn" class="signin-btn">Sign in with Microsoft account</button>
		<button id="signin-orgid-btn" class="signin-btn signin-btn-secondary">Sign in with work or school account</button>
		<div id="signin-error" class="signin-error" role="alert" style="display:none;"></div>
		<div id="signin-progress" class="signin-progress" style="display:none;">Signing in...</div>
	</div>
</div>
<div id="preview-area">
<div id="article-header" style="display:none;" role="toolbar" aria-label="Article options">
	<button id="highlight-btn" aria-pressed="false" title="Toggle highlighter">
		<img src="images/editoroptions/highlight_tool_off.svg" alt="">
	</button>
	<div class="header-separator"></div>
	<div id="font-family-group">
		<button id="sans-serif-btn" class="font-btn active" aria-pressed="true">Sans-serif</button>
		<button id="serif-btn" class="font-btn" aria-pressed="false">Serif</button>
	</div>
	<div class="header-separator"></div>
	<div id="font-size-group">
		<button id="font-decrease-btn" title="Decrease font size">
			<img src="images/editoroptions/font_down.svg" alt="">
		</button>
		<button id="font-increase-btn" title="Increase font size">
			<img src="images/editoroptions/font_up.svg" alt="">
		</button>
	</div>
</div>
<iframe id="content-frame" tabindex="-1"></iframe>
<iframe id="preview-frame" tabindex="-1"></iframe>
<div id="preview-container" tabindex="-1"></div>
</div>
<div id="sidebar" role="main" aria-label="OneNote Web Clipper">
	<div id="sidebar-header">
		<img src="images/onenote_logo_clipper_small.png" alt="">
		<span class="title" id="sidebar-title">OneNote Web Clipper</span>
	</div>
	<div id="sidebar-body">
		<div id="mode-panel" role="toolbar" aria-label="Clipping mode">
			<button class="mode-btn selected" data-mode="fullpage" aria-pressed="true">
				<img src="images/fullpage.svg" alt=""><span>Full Page</span>
			</button>
			<button class="mode-btn" data-mode="article" aria-pressed="false">
				<img src="images/article.svg" alt=""><span>Article</span>
			</button>
			<button class="mode-btn" data-mode="bookmark" aria-pressed="false">
				<img src="images/bookmark.svg" alt=""><span>Bookmark</span>
			</button>
			<button class="mode-btn" data-mode="region" aria-pressed="false">
				<img src="images/region.svg" alt=""><span>Region</span>
			</button>
		</div>
		<hr class="sidebar-divider">
		<div id="meta-panel">
			<label class="field-label" id="title-label" for="title-field">Title</label>
			<textarea id="title-field" rows="2" placeholder="Add a page title..."></textarea>
			<label class="field-label" id="note-label" for="note-field">Note</label>
			<textarea id="note-field" rows="2" placeholder="Add a note..."></textarea>
			<label class="field-label" id="source-label">Source</label>
			<div id="source-url" class="source-url" aria-labelledby="source-label"></div>
			<label class="field-label" id="section-label">Save to</label>
			<div id="section-picker">
				<div id="section-selected" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-labelledby="section-label"></div>
				<div id="section-list-container" role="listbox">
					<ul id="section-list" role="presentation"></ul>
				</div>
			</div>
		</div>
		<div id="button-row">
			<button id="save-btn">Clip</button>
			<button id="cancel-btn">Cancel</button>
		</div>
		<div id="capture-panel">
			<div id="status-text"></div>
			<div id="progress-info"></div>
			<div id="progress-bar-track"><div id="progress-bar-fill" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"></div></div>
		</div>
	</div>
	<div id="user-info">
		<a id="feedback-link" href="#"><img src="images/feedback_smiley.svg" alt="" class="feedback-icon"><span id="feedback-label">Feedback</span></a>
		<div id="user-info-right">
			<span id="user-email"></span>
			<a id="signout-link" href="#">Sign out</a>
		</div>
	</div>
</div>
<div id="aria-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<script src="renderer.js"></script>
</body>
</html>
